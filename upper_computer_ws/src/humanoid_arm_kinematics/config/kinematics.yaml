# Modified DH parameters for the 4-DOF humanoid robot arm.
# Convention: Modified DH (alpha_{i-1}, a_{i-1}, d_i, theta_i)
#   T_i = Rot_X(alpha_{i-1}) * Trans_X(a_{i-1}) * Rot_Z(theta_i) * Trans_Z(d_i)
# Angles in degrees, lengths in meters (converted from cm → ÷100).

dh_params:
  # Link 1 (a1: 0.2cm, d1: 0.3cm)
  - alpha_prev_deg: -90.0
    a_prev_m: 0.002
    d_m: 0.003
  # Link 2 (a2: 2.89cm, d2: 5cm)
  - alpha_prev_deg: 90.0
    a_prev_m: 0.0289
    d_m: 0.05
  # Link 3 (a3: 0cm, d3: 7cm)
  - alpha_prev_deg: -90.0
    a_prev_m: 0.0
    d_m: 0.07
  # Link 4 (a4: 0cm, d4: 3.5cm)
  - alpha_prev_deg: 90.0
    a_prev_m: 0.0
    d_m: 0.035

# The controllable orientation angle theta is defined as the end-effector
# rotation about the base-frame Z axis (yaw), extracted from the FK rotation matrix.
controllable_axis: "base_z"

# Tool (end-effector) offset from the last joint frame.
# Translation [x, y, z] in meters, rotation [roll, pitch, yaw] in degrees
# about the last link frame axes.
tool_offset:
  translation: [0.0, 0.0, 0.0]
  rotation_deg: [0.0, 0.0, 0.0]
