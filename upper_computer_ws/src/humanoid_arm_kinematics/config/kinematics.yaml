# The URDF is the only kinematic geometry source.  Target orientation is
# intentionally ignored; IK controls tip_frame position only.
model:
  description_package: "humanoid_arm_description"
  urdf_relative_path: "urdf/humanoid_arm.urdf"
  base_link: "base_link"
  tip_link: "tip_frame"

frame_id:
  base: "base_link"

processing_rate_hz: 30.0

topics:
  target: "kinematics/target"
  joint_command: "kinematics/joint_command"
  joint_state: "kinematics/joint_state"
  simulated_joint_state: "joint_states"
  end_effector_pose: "kinematics/end_effector_pose"
  diagnostics: "kinematics/diagnostics"
  visualization: "kinematics/visualization"

ik_solver:
  max_iterations: 250
  position_tolerance_m: 0.001
  initial_lambda: 0.03
  lambda_increase_factor: 2.0
  lambda_decrease_factor: 0.5
  lambda_min: 1.0e-05
  lambda_max: 1.0
  multi_start_attempts: 8
  multi_start_perturbation_rad: 0.5
  # Null-space preference for the solution closest to measured joint state.
  continuity_gain: 0.02
  max_step_rad: 0.25

validation:
  max_position_error_m: 0.005

shaper:
  position_dead_zone_m: 0.001
  max_position_step_m: 0.05
  position_alpha: 0.3
