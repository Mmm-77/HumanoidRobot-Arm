# Joint limits for the 4-DOF arm.
# Angles in degrees, velocities in degrees per second.
# Sourced from MotorAngleDetectTask.c upper-limb limits.

joints:
  # Joint indices match motor IDs 1-4

  joint_1:
    angle_min_deg: -85.0
    angle_max_deg: 175.0
    max_velocity_deg_per_s: 180.0

  joint_2:
    angle_min_deg: -10.0
    angle_max_deg: 150.0
    max_velocity_deg_per_s: 180.0

  joint_3:
    angle_min_deg: -100.0
    angle_max_deg: 100.0
    max_velocity_deg_per_s: 180.0

  joint_4:
    angle_min_deg: -40.0
    angle_max_deg: 100.0
    max_velocity_deg_per_s: 180.0

# Inverse kinematics solver configuration
ik_solver:
  # Maximum iterations per solve attempt
  max_iterations: 200
  # Convergence threshold: stop when position error (m) and orientation error (rad)
  # are both below these values
  position_tolerance_m: 0.001
  orientation_tolerance_rad: 0.01
  # Initial damping factor for damped least squares (Levenberg-Marquardt)
  initial_lambda: 0.1
  # Damping adjustment: multiply lambda by this factor when error increases
  lambda_increase_factor: 2.0
  # Damping adjustment: multiply lambda by this factor when error decreases
  lambda_decrease_factor: 0.5
  # Minimum / maximum damping values
  lambda_min: 1.0e-06
  lambda_max: 1.0
  # Number of multi-start initial guesses (random perturbations around current pose)
  multi_start_attempts: 5
  # Maximum perturbation (rad) for multi-start offsets
  multi_start_perturbation_rad: 0.3

# Singularity detection threshold
singularity:
  # Minimum manipulability measure (μ = sqrt(det(J*J^T))) below which
  # a configuration is considered singular
  manipulability_threshold: 0.001

# Solution validation
validation:
  # Maximum allowed position error (m) when forward-kinematics-validating an IK result
  max_position_error_m: 0.005
  # Maximum allowed orientation error (rad) for the controllable axis
  max_orientation_error_rad: 0.02

# Target shaper
shaper:
  # Position dead zone (m): ignore target changes smaller than this
  position_dead_zone_m: 0.001
  # Orientation dead zone (rad)
  orientation_dead_zone_rad: 0.005
  # Maximum position change per control step (m), applied as clipping
  max_position_step_m: 0.05
  # Maximum orientation change per control step (rad)
  max_orientation_step_rad: 0.1
  # EMA smoothing alpha for position (0 = no smoothing, 1 = no update)
  position_alpha: 0.3
  # EMA smoothing alpha for orientation
  orientation_alpha: 0.3
